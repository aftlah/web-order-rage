<!DOCTYPE html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R.A.G.E - Activity Monitor</title>
    <link rel="icon" href="images/LOGO_RAGE.png" type="image/png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="antialiased">
    <header class="shadow-xl sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-2">
        <div class="flex items-center justify-between">
          <div class="logo-container">
            <img src="images/LOGO_RAGE.png" alt="R.A.G.E Logo" class="w-12" />
            <div class="brand-title">
              <h1 class="text-xl font-black">R.A.G.E</h1>
              <p class="brand-subtitle text-[10px] uppercase font-bold tracking-wider">Order System</p>
            </div>
          </div>
          <div class="flex items-center gap-8">
            <nav id="mainNav" class="hidden md:flex items-center gap-1">
              <a href="index.html" class="nav-link">Order</a>
              <a href="dashboard.html" class="nav-link">Dashboard</a>
              <a href="storan.html" class="nav-link">Storan</a>
              <a href="drugs.html" class="nav-link">Drugs</a>
              <a href="kas.html" class="nav-link">Kas</a>
              <a href="rekap.html" class="nav-link">Rekap</a>
              <a href="admin_activity.html" class="nav-link nav-active">Monitor</a>
            </nav>
            <button id="logoutBtn" class="btn-logout hidden md:block">Logout</button>
            <div class="text-right hidden sm:block border-l border-[#2d1b14] pl-6">
              <p class="today-label">Today</p>
              <p class="today-date" id="current-date"></p>
            </div>
            <button id="mobileMenuBtn" class="md:hidden" onclick="toggleMobileMenu()">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div id="mobileMenu" class="mobile-menu absolute top-full left-0 w-full hidden flex flex-col z-50">
        <div class="flex flex-col p-4 gap-1">
          <a href="index.html" class="mobile-nav-link">Order</a>
          <a href="dashboard.html" class="mobile-nav-link">Dashboard</a>
          <a href="storan.html" class="mobile-nav-link">Storan</a>
          <a href="drugs.html" class="mobile-nav-link">Drugs</a>
          <a href="kas.html" class="mobile-nav-link">Kas</a>
          <a href="rekap.html" class="mobile-nav-link">Rekap</a>
          <a href="admin_activity.html" class="mobile-nav-link mobile-nav-active">Monitor</a>
          <hr class="border-[#2d1b14] my-2" />
          <button id="mobileLogoutBtn" class="mobile-nav-link text-red-500">Logout</button>
        </div>
      </div>
    </header>

    <main id="adminActivitySection" class="max-w-7xl mx-auto px-6 py-8 relative z-10">
      <div class="bg-white/90 dark:bg-[#1f1410]/95 backdrop-blur-md border border-amber-200/70 dark:border-[#3d342d] rounded-2xl shadow-xl p-6 mb-6">
        <div class="flex items-center gap-3">
          <span class="w-1.5 h-8 rounded-full section-divider"></span>
          <div>
            <h2 class="text-2xl font-black text-amber-900 dark:text-amber-100">Monitoring Aktivitas</h2>
            <p class="text-sm text-slate-600 dark:text-amber-200/70">Login history, akses halaman, dan sesi aktif (heartbeat).</p>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-white/95 dark:bg-[#1f1410]/95 border border-amber-200/70 dark:border-[#3d342d] rounded-2xl shadow-xl p-6">
          <h3 class="text-lg font-bold text-amber-900 dark:text-amber-100 mb-4">Filter</h3>
          <div class="grid grid-cols-1 gap-3">
            <input id="actUserFilter" type="text" placeholder="Filter user id / member id / nama..." class="w-full px-4 py-3 rounded-xl bg-white dark:bg-[#0a0805] border border-amber-200/70 dark:border-[#3d342d] text-slate-800 dark:text-amber-50 focus:outline-none focus:ring-2 focus:ring-amber-500/40" />
            <select id="actType" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-[#0a0805] border border-amber-200/70 dark:border-[#3d342d] text-slate-800 dark:text-amber-50 focus:outline-none focus:ring-2 focus:ring-amber-500/40">
              <option value="sessions">Login Sessions</option>
              <option value="pages">Page Access</option>
              <option value="failed">Failed Login</option>
            </select>
            <button id="actReload" class="w-full px-4 py-3 rounded-xl bg-amber-600 text-[#1a1410] font-black uppercase tracking-widest text-xs hover:bg-amber-500 transition">
              Load
            </button>
          </div>
          <div class="mt-6 p-4 rounded-2xl border border-amber-100 dark:border-[#3d342d] bg-amber-50/40 dark:bg-yellow-900/10">
            <div class="text-[10px] uppercase tracking-widest text-slate-500 dark:text-amber-200/60 font-black mb-2">Sesi Aktif</div>
            <div id="activeSessionsCount" class="text-2xl font-black text-amber-900 dark:text-amber-100">0</div>
            <div class="mt-2 text-[11px] text-slate-500 dark:text-amber-200/60">Dianggap aktif jika last_seen &lt; 2 menit.</div>
          </div>
        </div>

        <div class="lg:col-span-2 bg-white/95 dark:bg-[#1f1410]/95 border border-amber-200/70 dark:border-[#3d342d] rounded-2xl shadow-xl p-6">
          <div class="flex items-center justify-between mb-4 gap-3">
            <h3 id="actTitle" class="text-lg font-bold text-amber-900 dark:text-amber-100">Log</h3>
            <button id="actAuto" class="px-4 py-2 rounded-xl border border-amber-200/70 dark:border-[#3d342d] text-xs font-bold text-amber-800 dark:text-amber-100 hover:bg-amber-50 dark:hover:bg-[#2a1b13] transition">
              Auto: ON
            </button>
          </div>
          <div class="overflow-auto rounded-xl border border-amber-100 dark:border-[#3d342d]">
            <table class="w-full text-sm">
              <thead class="bg-amber-50 dark:bg-[#24140c] text-amber-900 dark:text-amber-100">
                <tr id="actHead"></tr>
              </thead>
              <tbody id="actBody" class="divide-y divide-amber-100 dark:divide-[#3d342d]"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="config.js"></script>
    <script type="module" src="script.js"></script>
    <script src="interactive.js"></script>
  </body>
</html>
