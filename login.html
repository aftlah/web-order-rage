<!DOCTYPE html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — R.A.G.E Order System</title>
    <link rel="icon" href="/images/LOGO_RAGE.png" type="image/png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Glowing Background */
      .login-page-glow {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100vw;
        height: 100vh;
        background: 
          radial-gradient(circle at 30% 30%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 70% 70%, rgba(217, 119, 6, 0.06) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
        animation: breathGlow 10s ease-in-out infinite alternate;
      }
      
      @keyframes breathGlow {
        0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
        100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
      }

      /* Card Style */
      .login-card {
        background: rgba(18, 10, 6, 0.65);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(251, 191, 36, 0.15);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.05),
          0 32px 64px rgba(0, 0, 0, 0.8),
          0 0 80px rgba(217, 119, 6, 0.05);
        animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        position: relative;
        overflow: hidden;
      }
      
      /* Subtle inner highlight on the card top edge */
      .login-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.4), transparent);
        z-index: 10;
      }

      /* Logo Enhancement */
      .login-logo-ring {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(251,191,36,0.12) 0%, rgba(217,119,6,0.03) 70%, transparent 100%);
        border: 1px solid rgba(251,191,36,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-shadow: 0 0 30px rgba(251, 191, 36, 0.15), inset 0 0 20px rgba(251, 191, 36, 0.05);
      }

      .login-logo-ring::before {
        content: '';
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        border: 1.5px dashed rgba(251, 191, 36, 0.3);
        animation: spinSlow 20s linear infinite;
      }
      
      .login-logo-ring::after {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 1px solid rgba(251, 191, 36, 0.1);
        animation: spinSlow 15s linear infinite reverse;
      }

      @keyframes spinSlow {
        to { transform: rotate(360deg); }
      }

      /* Input Fields */
      .input-group {
        position: relative;
      }
      
      .input-group label {
        transition: color 0.3s ease, text-shadow 0.3s ease;
      }
      
      .input-group:focus-within label {
        color: #fbbf24;
        text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
      }

      .login-input {
        width: 100%;
        padding: 15px 48px 15px 20px;
        background: rgba(5, 3, 2, 0.5);
        border: 1.5px solid rgba(61, 52, 45, 0.8);
        border-radius: 14px;
        color: #fef3c7;
        font-size: 15px;
        font-family: 'Poppins', sans-serif;
        outline: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .login-input:focus {
        border-color: #f59e0b;
        background: rgba(10, 6, 4, 0.8);
        box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.12), inset 0 2px 4px rgba(0,0,0,0.5);
        transform: translateY(-1px);
      }

      .login-input::placeholder {
        color: #5a4b3d;
        font-weight: 500;
      }

      /* Button Glow */
      .login-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: #1a0f0a;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 8px 25px rgba(217, 119, 6, 0.4);
        position: relative;
        overflow: hidden;
      }

      .login-btn::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        transition: left 0.6s ease;
      }

      .login-btn:hover::before {
        left: 100%;
      }

      .login-btn:hover {
        box-shadow: 0 15px 35px rgba(217, 119, 6, 0.6), 0 0 20px rgba(251, 191, 36, 0.3);
        transform: translateY(-3px) scale(1.02);
      }

      .login-btn:active {
        transform: translateY(0) scale(0.98);
      }

      .login-btn-spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(26,15,10,0.3);
        border-top-color: #1a0f0a;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: sub;
        margin-right: 10px;
      }

      /* Text Glow Utility */
      .text-glow {
        text-shadow: 0 0 24px rgba(251, 191, 36, 0.5);
      }

      /* Eye Toggle */
      .eye-toggle {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: #786655;
        cursor: pointer;
        transition: all 0.3s ease;
        background: none;
        border: none;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .eye-toggle:hover {
        color: #f59e0b;
        transform: translateY(-50%) scale(1.1);
      }

      .divider-line {
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(251, 191, 36, 0.2), transparent);
      }
    </style>
  </head>
  <body>
    <!-- Ambient glow -->
    <div class="login-page-glow"></div>


    <!-- Main Login Area -->
    <main class="relative z-10 min-h-[calc(100vh-64px)] flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        
        <!-- Logo & Title -->
        <div class="flex flex-col items-center mb-8" style="animation: fadeInUp 0.4s ease both;">
          <div class="login-logo-ring mb-5">
            <img src="images/LOGO_RAGE.png" alt="R.A.G.E" class="w-12 h-12 object-contain" />
          </div>
          <h2 class="text-2xl font-black text-yellow-500 tracking-tight text-glow">Masuk ke R.A.G.E</h2>
          <p class="text-xs text-stone-500 mt-1 font-medium">Order System — Para anggota bersatu</p>
        </div>

        <!-- Card -->
        <div class="login-card rounded-2xl p-8">
          
          <!-- Divider -->
          <div class="divider-line mb-7"></div>

          <!-- Form -->
          <form id="loginForm" class="flex flex-col gap-5" autocomplete="off" novalidate>

            <!-- Username -->
            <div class="flex flex-col gap-2 input-group">
              <label for="loginEmail" class="text-xs font-bold text-stone-500 uppercase tracking-widest flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5 text-yellow-700">
                  <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
                </svg>
                Username
              </label>
              <div class="relative">
                <input
                  id="loginEmail"
                  type="text"
                  required
                  autocomplete="username"
                  placeholder="contoh: leo / evan"
                  class="login-input pr-4"
                />
              </div>
            </div>

            <!-- Password -->
            <div class="flex flex-col gap-2 input-group">
              <label for="loginPassword" class="text-xs font-bold text-stone-500 uppercase tracking-widest flex items-center gap-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5 text-yellow-700">
                  <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clip-rule="evenodd" />
                </svg>
                Password
              </label>
              <div class="relative">
                <input
                  id="loginPassword"
                  type="password"
                  required
                  autocomplete="current-password"
                  placeholder="••••••••"
                  class="login-input"
                />
                <button type="button" class="eye-toggle" id="eyeToggle" onclick="togglePassword()">
                  <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                  <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- Divider -->
            <div class="divider-line"></div>

            <!-- Submit -->
            <button id="loginBtn" type="submit" class="login-btn">
              <span id="loginBtnText">Masuk</span>
            </button>

          </form>
        </div>

        <!-- Footer note -->
        <p class="text-center text-xs text-stone-600 mt-6" style="animation: fadeIn 0.6s 0.5s ease both; opacity: 0; animation-fill-mode: both;">
          R.A.G.E Order System · Internal Only
        </p>
      </div>
    </main>

    <script src="config.js?v=20260413b"></script>
    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.2";
      const supabase =
        window.SUPABASE_URL && window.SUPABASE_ANON_KEY
          ? createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
          : null;

      // Show/hide password toggle
      window.togglePassword = function() {
        const input = document.getElementById('loginPassword');
        const eyeOpen = document.getElementById('eyeOpen');
        const eyeClosed = document.getElementById('eyeClosed');
        if (input.type === 'password') {
          input.type = 'text';
          eyeOpen.classList.add('hidden');
          eyeClosed.classList.remove('hidden');
        } else {
          input.type = 'password';
          eyeOpen.classList.remove('hidden');
          eyeClosed.classList.add('hidden');
        }
      };

      function setLoading(loading) {
        const btn = document.getElementById("loginBtn");
        const txt = document.getElementById("loginBtnText");
        btn.disabled = loading;
        if (loading) {
          txt.innerHTML = '<span class="login-btn-spinner"></span> Masuk...';
        } else {
          txt.innerHTML = 'Masuk';
        }
      }

      function show(message, type = "info") {
        if (typeof Swal !== 'undefined') {
          const icons = { success: 'success', error: 'error', warning: 'warning', info: 'info' };
          Swal.fire({
            text: message,
            icon: icons[type] || 'info',
            toast: true,
            position: 'top',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            background: '#1f1410',
            color: '#fef3c7',
            iconColor: type === 'success' ? '#22c55e' : (type === 'error' ? '#ef4444' : '#eab308'),
            customClass: {
              popup: 'border border-yellow-600/30 shadow-xl rounded-xl'
            },
            didOpen: (toast) => {
              toast.onmouseenter = Swal.stopTimer;
              toast.onmouseleave = Swal.resumeTimer;
            }
          });
          return;
        }
      }

      async function checkSession() {
        try {
          var keys = Object.keys(localStorage || {});
          var key = keys.find(function(k){return k.startsWith('sb-') && k.endsWith('-auth-token');});
          var raw = key ? localStorage.getItem(key) : null;
          if (!raw) return;
          var obj = JSON.parse(raw);
          var expSec = 0;
          if (typeof obj.expires_at === 'number') expSec = obj.expires_at;
          else if (obj.currentSession && typeof obj.currentSession.expires_at === 'number') expSec = obj.currentSession.expires_at;
          var hasToken = !!(obj.access_token || (obj.currentSession && obj.currentSession.access_token));
          if (hasToken && (expSec*1000) > Date.now()) location.href = 'rekap.html';
        } catch (e) {}
      }

      async function handleLogin(e) {
        e.preventDefault();
        if (!supabase) {
          show("Konfigurasi Supabase belum ada", "error");
          return;
        }
        const usernameOrEmail = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        setLoading(true);
        try {
          const primaryDomain = (window.AUTH_EMAIL_DOMAIN || "rage.example.com").trim();
          const legacyDomain = (window.LEGACY_AUTH_EMAIL_DOMAIN || "rage.local").trim();
          const candidates = usernameOrEmail.includes("@")
            ? [usernameOrEmail]
            : [`${usernameOrEmail}@${primaryDomain}`, `${usernameOrEmail}@${legacyDomain}`];

          let lastError = null;
          for (const email of candidates) {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (!error) {
              location.href = "rekap.html";
              return;
            }
            lastError = error;
          }
          show(`Gagal login: ${(lastError && lastError.message) || "unknown"}`, "error");
          setLoading(false);
        } catch (err) {
          show("Gagal login (network error)", "error");
          setLoading(false);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        checkSession();
        const form = document.getElementById("loginForm");
        form.addEventListener("submit", handleLogin);
      });
    </script>
    <script src="interactive.js"></script>
  </body>
</html>
