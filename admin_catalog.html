    <main class="max-w-7xl mx-auto p-4 sm:p-6 relative z-10">
      <div class="glass-card p-6 sm:p-8 mb-8 relative overflow-hidden group">
        <!-- background glow -->
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-amber-500/20 blur-[50px] rounded-full group-hover:bg-amber-500/30 transition duration-500 pointer-events-none"></div>
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 relative z-10">
          <div>
            <h2 class="text-2xl sm:text-3xl font-black text-amber-500 mb-2 tracking-tight">Manajemen Katalog</h2>
            <p class="text-slate-400 text-sm font-medium">Update harga, status item, dan kelola database persediaan barang.</p>
          </div>
          <div class="flex gap-3">
            <button id="refreshCatalog" class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-amber-500/30 text-amber-500 font-bold text-sm hover:bg-amber-500/10 hover:shadow-[0_0_15px_rgba(245,158,11,0.15)] transition-all duration-300">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
              </svg>
              Refresh
            </button>
            <button id="addNewItem" class="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-amber-500 to-amber-600 text-[#1a1410] font-bold text-sm hover:from-amber-400 hover:to-amber-500 hover:shadow-[0_0_20px_rgba(245,158,11,0.3)] hover:-translate-y-0.5 transition-all duration-300">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
              Tambah Item
            </button>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-6" id="catalogLists">
        <!-- Will be populated by categories -->
        <div class="flex justify-center py-20" id="loadingCatalog">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-amber-500"></div>
        </div>
      </div>
    </main>

    <!-- Modal Tambah/Edit Item -->
    <template id="itemModalTemplate">
      <div class="text-left space-y-5">
        <div>
          <label class="block text-xs font-black text-amber-500/80 uppercase tracking-widest mb-2">Kategori</label>
          <select id="modalKategori" class="w-full px-4 py-3.5 rounded-xl bg-[#0a0604]/80 border border-amber-500/20 text-amber-50 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all shadow-inner">
            <option value="Gun">Gun</option>
            <option value="Ammo">Ammo</option>
            <option value="Attachment">Attachment</option>
            <option value="Others">Others</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-black text-amber-500/80 uppercase tracking-widest mb-2">Nama Item</label>
          <input id="modalName" type="text" class="w-full px-4 py-3.5 rounded-xl bg-[#0a0604]/80 border border-amber-500/20 text-amber-50 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all placeholder:text-slate-600 shadow-inner" placeholder="Contoh: PISTOL .50" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-black text-amber-500/80 uppercase tracking-widest mb-2">Harga Dasar</label>
            <input id="modalPrice" type="number" class="w-full px-4 py-3.5 rounded-xl bg-[#0a0604]/80 border border-amber-500/20 text-amber-50 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all placeholder:text-slate-600 shadow-inner font-mono" placeholder="0" />
          </div>
          <div>
            <label class="block text-xs font-black text-amber-500/80 uppercase tracking-widest mb-2">Scrap (Opsional)</label>
            <input id="modalScrap" type="number" step="0.1" class="w-full px-4 py-3.5 rounded-xl bg-[#0a0604]/80 border border-amber-500/20 text-amber-50 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all placeholder:text-slate-600 shadow-inner font-mono" placeholder="0" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-black text-amber-500/80 uppercase tracking-widest mb-2">Limit Order</label>
          <input id="modalMaxLimit" type="number" min="1" class="w-full px-4 py-3.5 rounded-xl bg-[#0a0604]/80 border border-amber-500/20 text-amber-50 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all placeholder:text-slate-600 shadow-inner font-mono" placeholder="Limit maksimal per order" required />
        </div>
        <div>
          <label class="block text-xs font-black text-amber-500/80 uppercase tracking-widest mb-2">Catatan (Metadata)</label>
          <input id="modalNote" type="text" class="w-full px-4 py-3.5 rounded-xl bg-[#0a0604]/80 border border-amber-500/20 text-amber-50 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all placeholder:text-slate-600 shadow-inner" placeholder="Contoh: max 20" />
        </div>
      </div>
    </template>

      function toggleMobileMenu() { document.getElementById("mobileMenu").classList.toggle("hidden"); }
